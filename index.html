<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Phoenix -- Roster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header class="header">
  <a href="index.html" class="header-link">
    <span class="header-emblem">🔥</span>
    <h1 id="headerTeamName">Team Phoenix</h1>
    <p class="header-sub">Raid Hub</p>
  </a>
  <div class="header-divider"></div>
</header>

<nav class="site-nav" id="siteNav">
  <button class="site-nav-item active" id="navHome" onclick="showView('landing')" data-tooltip="Back to the roster overview">Home</button>
  <button class="site-nav-item" id="navSignup" onclick="showSignupView()" data-tooltip="Apply to join the raid team for next season">Sign Up</button>
  <div class="site-nav-right">
    <button class="site-nav-item site-nav-discord" id="navDiscord" disabled data-tooltip="Discord login coming soon -- view your profile and notifications">Login with Discord</button>
    <a href="officer.html" class="site-nav-item" id="navOfficer" data-tooltip="Officer dashboard -- manage roster, loot, and signups">Officer Access</a>
  </div>
</nav>

<div id="loadingMsg" class="state-msg">
  <div class="spinner"></div><br>Loading roster data...
</div>

<!-- Landing -->
<div id="landingView" class="view">
  <div class="landing-body">
    <div id="landingStats" class="pub-stats"></div>
    <div class="landing-card">
      <span class="selector-label">Who are you?</span>
      <div class="selector-outer">
        <select id="playerSelect">
          <option value="">-- Select your character --</option>
        </select>
      </div>
    </div>
    <div id="landingProgression"></div>
    <div id="landingLoot" class="pub-loot"></div>
  </div>
  <div class="footer">We Go Again &middot; <span class="team-name">Team Phoenix</span> &middot; v<span id="versionNum"></span> &middot; <a class="footer-link" href="https://github.com/katogaming88/WGA-Raid-Hub/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Changelog</a></div>
</div>

<!-- Profile -->
<div id="profileViewWrap" class="view">
  <div id="profileView"></div>
  <div class="footer">We Go Again &middot; <span class="team-name">Team Phoenix</span> &middot; v<span id="versionNumProfile"></span> &middot; <a class="footer-link" href="https://github.com/katogaming88/WGA-Raid-Hub/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Changelog</a></div>
</div>

<!-- Signup -->
<div id="signupViewWrap" class="view">
  <div id="signupView">
    <div class="signup-wrap">
      <div id="signupForm"></div>
    </div>
  </div>
  <div class="footer">We Go Again &middot; <span class="team-name">Team Phoenix</span> &middot; v<span id="versionNumSignup"></span> &middot; <a class="footer-link" href="https://github.com/katogaming88/WGA-Raid-Hub/blob/main/CHANGELOG.md" target="_blank" rel="noopener">Changelog</a></div>
</div>

<script src="js/common.js"></script>
<script src="js/roster.js"></script>
<script src="js/signup.js"></script>
<script>
['versionNum','versionNumProfile','versionNumSignup'].forEach(function(id){document.getElementById(id).textContent=VERSION;});
document.title = TEAM_NAME + ' -- Roster';
document.getElementById('headerTeamName').textContent = TEAM_NAME;
document.querySelectorAll('.team-name').forEach(function(el){el.textContent=TEAM_NAME;});
if (TEAM_SLUG !== 'phoenix') {
  document.querySelectorAll('a[href="officer.html"]').forEach(function(a){a.href='officer.html?team='+TEAM_SLUG;});
}
</script>
</body>
</html>
