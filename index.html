<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Phoenix — My Priority</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:          #0d0e12;
    --bg-card:     #13151c;
    --bg-elevated: #1a1d27;
    --bg-input:    #0f1118;
    --border:      rgba(255,255,255,0.07);
    --border-mid:  rgba(255,255,255,0.12);
    --gold:        #d6a344;
    --gold-dim:    #9e742a;
    --gold-light:  #f0c870;
    --text:        #e8e3d8;
    --text-muted:  #7a7568;
    --text-dim:    #8a8680;
    --tank:        #4a9eff;
    --heal:        #3ddc84;
    --ranged:      #bf8cff;
    --melee:       #ff7c5c;
    --rank1-bg:    rgba(214,163,68,0.15);
    --rank1-text:  #d6a344;
    --rank1-border:rgba(214,163,68,0.4);
    --rank2-bg:    rgba(176,190,197,0.1);
    --rank2-text:  #b0bec5;
    --rank2-border:rgba(176,190,197,0.3);
    --rank3-bg:    rgba(205,127,74,0.1);
    --rank3-text:  #cd7f4a;
    --rank3-border:rgba(205,127,74,0.3);
    --rankn-bg:    rgba(255,255,255,0.04);
    --rankn-text:  #7a7568;
    --rankn-border:rgba(255,255,255,0.08);
  }
  body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; min-height:100vh; display:flex; flex-direction:column; }

  /* Header */
  .header { position:relative; padding:2.5rem 2rem 2rem; text-align:center; border-bottom:1px solid var(--border); overflow:hidden; }
  .header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 140% at 50% 0%, rgba(214,163,68,0.07) 0%, transparent 70%); pointer-events:none; }
  .header-emblem { font-size:2rem; display:block; margin-bottom:0.4rem; filter:drop-shadow(0 0 10px rgba(214,163,68,0.35)); }
  .header h1 { font-family:'Cinzel',serif; font-size:1.7rem; font-weight:700; letter-spacing:0.12em; color:var(--gold-light); text-shadow:0 0 24px rgba(214,163,68,0.25); }
  .header-sub { font-size:0.75rem; color:var(--text-muted); letter-spacing:0.18em; text-transform:uppercase; margin-top:0.3rem; }
  .header-divider { width:100px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:1rem auto 0; }

  /* Selector */
  .selector-wrap { display:flex; flex-direction:column; align-items:center; padding:2.5rem 2rem; gap:0.6rem; }
  .selector-label { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
  .selector-outer { position:relative; width:100%; max-width:360px; }
  .selector-outer::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--gold-dim); pointer-events:none; font-size:0.9rem; }
  select#playerSelect { width:100%; appearance:none; background:var(--bg-input); border:1px solid var(--border-mid); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:500; padding:0.65rem 2.2rem 0.65rem 1rem; border-radius:3px; cursor:pointer; transition:border-color 0.15s; outline:none; }
  select#playerSelect:hover { border-color:var(--gold-dim); }
  select#playerSelect:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(214,163,68,0.12); }
  select#playerSelect option { background:#1a1d27; }

  /* States */
  .state-msg { text-align:center; padding:3rem 2rem; color:var(--text-muted); font-size:0.85rem; letter-spacing:0.05em; }
  .state-msg.error { color:#ff7c5c; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border-mid); border-top-color:var(--gold-dim); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:0.75rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Profile */
  #profile { flex:1; padding:0 2rem 3rem; max-width:680px; width:100%; margin:0 auto; }
  .profile-card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; overflow:hidden; animation:fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

  .role-bar { height:3px; width:100%; }
  .role-bar-Tank   { background:var(--tank); }
  .role-bar-Heal   { background:var(--heal); }
  .role-bar-Ranged { background:var(--ranged); }
  .role-bar-Melee  { background:var(--melee); }

  .profile-header { display:flex; align-items:center; gap:1rem; padding:1.25rem 1.25rem 1rem; border-bottom:1px solid var(--border); }
  .profile-avatar { width:52px; height:52px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:1.15rem; font-weight:600; flex-shrink:0; }
  .avatar-Tank   { background:rgba(74,158,255,0.12);  color:var(--tank);   border:1px solid rgba(74,158,255,0.25); }
  .avatar-Heal   { background:rgba(61,220,132,0.12);  color:var(--heal);   border:1px solid rgba(61,220,132,0.25); }
  .avatar-Ranged { background:rgba(191,140,255,0.12); color:var(--ranged); border:1px solid rgba(191,140,255,0.25); }
  .avatar-Melee  { background:rgba(255,124,92,0.12);  color:var(--melee);  border:1px solid rgba(255,124,92,0.25); }

  .profile-identity { flex:1; min-width:0; }
  .profile-name { font-family:'Cinzel',serif; font-size:1.2rem; font-weight:700; color:var(--text); line-height:1.2; }
  .profile-realm { font-size:1rem; color:var(--text-dim); letter-spacing:0.04em; margin-top:2px; }
  .profile-badges { display:flex; gap:0.4rem; margin-top:0.5rem; flex-wrap:wrap; align-items:center; }

  .badge { font-size:0.72rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
  .badge-Tank   { background:rgba(74,158,255,0.12);  color:var(--tank);   border:1px solid rgba(74,158,255,0.2); }
  .badge-Heal   { background:rgba(61,220,132,0.12);  color:var(--heal);   border:1px solid rgba(61,220,132,0.2); }
  .badge-Ranged { background:rgba(191,140,255,0.12); color:var(--ranged); border:1px solid rgba(191,140,255,0.2); }
  .badge-Melee  { background:rgba(255,124,92,0.12);  color:var(--melee);  border:1px solid rgba(255,124,92,0.2); }
  .badge-trial  { background:rgba(240,200,112,0.1);  color:#f0c870;       border:1px solid rgba(240,200,112,0.2); }
  .badge-class  { background:rgba(255,255,255,0.04); color:var(--text-muted); border:1px solid var(--border); }

  .profile-section { padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
  .profile-section:last-child { border-bottom:none; }
  .section-label { font-size:1rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:0.75rem; }

  /* BiS */
  .bis-row { display:flex; align-items:center; gap:0.65rem; }
  .bis-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .bis-dot.yes { background:#3ddc84; box-shadow:0 0 6px rgba(61,220,132,0.35); }
  .bis-dot.no  { background:var(--text-dim); }
  .bis-link { font-size:0.85rem; font-weight:500; color:var(--gold); text-decoration:none; border-bottom:1px solid rgba(214,163,68,0.3); transition:color 0.15s,border-color 0.15s; word-break:break-all; }
  .bis-link:hover { color:var(--gold-light); border-color:var(--gold); }
  .bis-none { font-size:0.85rem; color:var(--text-muted); }

  /* Priority */
  .priority-list { display:flex; flex-direction:column; gap:0.5rem; }
  .priority-row { display:grid; grid-template-columns:auto auto 1fr; align-items:center; gap:0.75rem; background:var(--bg-elevated); border:1px solid var(--border); border-radius:3px; padding:0.6rem 0.8rem; }
  .priority-item-name { font-size:1.2rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .priority-item-slot { font-size:0.88rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.07em; white-space:nowrap; }
  .rank-pill { font-family:'Cinzel',serif; font-size:0.72rem; font-weight:600; padding:3px 10px; border-radius:2px; min-width:40px; text-align:center; white-space:nowrap; }
  .rank-1 { background:var(--rank1-bg); color:var(--rank1-text); border:1px solid var(--rank1-border); }
  .rank-2 { background:var(--rank2-bg); color:var(--rank2-text); border:1px solid var(--rank2-border); }
  .rank-3 { background:var(--rank3-bg); color:var(--rank3-text); border:1px solid var(--rank3-border); }
  .rank-n { background:var(--rankn-bg); color:var(--rankn-text); border:1px solid var(--rankn-border); }
  .rank-unranked { background:transparent; color:var(--text-dim); border:1px solid var(--border); font-size:0.65rem; font-family:'Rajdhani',sans-serif; letter-spacing:0.04em; }
  .no-items-msg { font-size:0.8rem; color:var(--text-dim); font-style:italic; }

  /* Attendance */
  .attend-row { display:flex; align-items:center; gap:0.75rem; }
  .attend-bar-wrap { flex:1; height:6px; background:var(--bg-elevated); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
  .attend-bar { height:100%; border-radius:3px; background:var(--heal); transition:width 0.4s ease; }
  .attend-label { font-size:0.88rem; font-weight:600; color:var(--text); min-width:42px; text-align:right; }

  .footer { text-align:center; padding:1.5rem; font-size:0.65rem; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; border-top:1px solid var(--border); }
</style>
</head>
<body>

<header class="header">
  <span class="header-emblem">🔥</span>
  <h1>Team Phoenix</h1>
  <p class="header-sub">Season 2 · Loot Priority</p>
  <div class="header-divider"></div>
</header>

<div class="selector-wrap">
  <span class="selector-label">Who are you?</span>
  <div class="selector-outer">
    <select id="playerSelect">
      <option value="">— Select your character —</option>
    </select>
  </div>
</div>

<div id="statusMsg" class="state-msg">
  <div class="spinner"></div><br>Loading roster data…
</div>

<main id="profile" style="display:none"></main>

<footer class="footer">Team Phoenix · Season 2</footer>

<script>
const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxrQdQGqbBTELWm7huWChdbES0ry7WFZetlELWuEdI0T6lfbXEzrqx9Vo5yA-b9dW4y7A/exec';

let DATA = null;

function normalise(str) {
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

function loadData() {
  window._rosterCallback = function(data) {
    try {
      if (data.error) throw new Error(data.error);
      DATA = data;
      populateDropdown();
      setStatus('');
      renderAttendanceOverview();
    } catch (e) {
      setStatus('Could not load roster data. ' + e.message, true);
    }
  };
  const script = document.createElement('script');
  script.src = WEB_APP_URL + '?callback=_rosterCallback';
  script.onerror = function() {
    setStatus('Could not load roster data. Check Web App URL and deployment.', true);
  };
  document.head.appendChild(script);
  setTimeout(function() {
    if (!DATA) setStatus('Could not load roster data. Request timed out.', true);
  }, 15000);
}

function populateDropdown() {
  const sel = document.getElementById('playerSelect');
  const order = ['Tank', 'Heal', 'Melee', 'Ranged'];
  const labels = { Tank: '🛡 Tanks', Heal: '💚 Healers', Melee: '⚔️ Melee', Ranged: '🏹 Ranged' };
  const groups = { Tank: [], Heal: [], Melee: [], Ranged: [] };
  for (var i = 0; i < DATA.roster.length; i++) {
    var p = DATA.roster[i];
    if (groups[p.role]) groups[p.role].push(p);
  }
  for (var r = 0; r < order.length; r++) {
    var role = order[r];
    var players = groups[role];
    if (!players.length) continue;
    players.sort(function(a, b) {
      return (a.nick || a.firstName).localeCompare(b.nick || b.firstName);
    });
    var group = document.createElement('optgroup');
    group.label = labels[role];
    for (var j = 0; j < players.length; j++) {
      var p = players[j];
      var opt = document.createElement('option');
      opt.value = p.firstName;
      opt.textContent = p.nick ? p.nick + ' (' + p.firstName + ')' : p.firstName;
      group.appendChild(opt);
    }
    sel.appendChild(group);
  }
}

function setStatus(msg, isError) {
  var el = document.getElementById('statusMsg');
  if (!msg) { el.style.display = 'none'; return; }
  el.className = 'state-msg' + (isError ? ' error' : '');
  el.innerHTML = msg;
  el.style.display = '';
}

function getRank(firstName, itemName) {
  var list = (DATA.priorityOrder || {})[itemName];
  if (!list) return null;
  var normFirst = normalise(firstName);
  for (var i = 0; i < list.length; i++) {
    if (normalise(list[i]) === normFirst) return i + 1;
  }
  return null;
}

function getBisItems(firstName) {
  var bisMap = DATA.bisList || {};
  var normFirst = normalise(firstName);
  var key = null;
  var keys = Object.keys(bisMap);
  for (var i = 0; i < keys.length; i++) {
    if (normalise(keys[i]) === normFirst) { key = keys[i]; break; }
  }
  var entries = key ? bisMap[key] : [];
  return entries.map(function(e) {
    return (typeof e === 'string') ? { item: e, slot: '' } : e;
  });
}

function rankPillHTML(rank) {
  if (rank === null) return '<span class="rank-pill rank-unranked">Not ranked</span>';
  // Gradient from gold (#1) fading to grey as rank increases
  var maxRank = 15;
  var t = Math.min((rank - 1) / (maxRank - 1), 1);
  var r = Math.round(214 + (100 - 214) * t);
  var g = Math.round(163 + (100 - 163) * t);
  var b = Math.round(68  + (100 - 68)  * t);
  var alpha = Math.max(0.08, 0.18 - t * 0.1);
  var color = 'rgb(' + r + ',' + g + ',' + b + ')';
  var bg    = 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  var border = 'rgba(' + r + ',' + g + ',' + b + ',' + Math.max(0.2, 0.4 - t * 0.2) + ')';
  return '<span class="rank-pill" style="background:' + bg + ';color:' + color + ';border:1px solid ' + border + ';">#' + rank + '</span>';
}

function renderAttendanceOverview() {
  var profile = document.getElementById('profile');
  var order = ['Tank', 'Heal', 'Melee', 'Ranged', 'Bench'];
  var labels = { Tank: '🛡 Tanks', Heal: '💚 Healers', Melee: '⚔️ Melee', Ranged: '🏹 Ranged', Bench: '🪑 Bench' };
  var groups = { Tank: [], Heal: [], Melee: [], Ranged: [], Bench: [] };
  for (var i = 0; i < DATA.roster.length; i++) {
  var p = DATA.roster[i];
  if (p.isBench) { groups['Bench'].push(p); }
  else if (groups[p.role]) { groups[p.role].push(p); }
}
  for (var r = 0; r < order.length; r++) {
    groups[order[r]].sort(function(a, b) {
      return (a.nick || a.firstName).localeCompare(b.nick || b.firstName);
    });
  }
  var html = '<div style="display:flex;flex-direction:column;gap:1.5rem;">';
  for (var r = 0; r < order.length; r++) {
    var role = order[r];
    var players = groups[role];
    if (!players.length) continue;
    html += '<div>';
    html += '<div onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'flex\':\'none\'" style="font-size:0.72rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--text-dim);font-weight:600;margin-bottom:0.6rem;cursor:pointer;display:flex;align-items:center;gap:0.5rem;">' + labels[role] + '<span style="font-size:0.6rem;color:var(--text-dim);">▼</span></div>';
    html += '<div style="display:flex;flex-direction:column;gap:0.4rem;">';
    for (var j = 0; j < players.length; j++) {
      var p = players[j];
      var name = p.nick || p.firstName;
      var pct = parseInt(p.attendance) || 0;
      var bar = p.attendance || '0%';
      var color = pct >= 90 ? 'var(--heal)' : pct >= 75 ? 'var(--gold)' : 'var(--melee)';
      html += '<div style="display:grid;grid-template-columns:110px 1fr 44px;align-items:center;gap:0.75rem;padding:0.5rem 0.75rem;background:var(--bg-card);border:1px solid var(--border);border-radius:3px;">';
      html += '<span style="font-size:0.88rem;font-weight:500;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + name + '</span>';
      html += '<div style="height:5px;background:var(--bg-elevated);border-radius:3px;overflow:hidden;border:1px solid var(--border);"><div style="height:100%;width:' + bar + ';background:' + color + ';border-radius:3px;"></div></div>';
      html += '<span style="font-size:0.82rem;font-weight:600;color:' + color + ';text-align:right;">' + (p.attendance || '—') + '</span>';
      html += '</div>';
    }
    html += '</div></div>';
  }
  html += '</div>';
  profile.innerHTML = html;
  profile.style.display = '';
}

function renderProfile(firstName) {
  var profile = document.getElementById('profile');
  if (!firstName) { renderAttendanceOverview(); return; }

  var normFirst = normalise(firstName);
  var player = null;
  for (var i = 0; i < DATA.roster.length; i++) {
    if (normalise(DATA.roster[i].firstName) === normFirst) { player = DATA.roster[i]; break; }
  }
  if (!player) { renderAttendanceOverview(); return; }

  var displayName = player.nick || player.firstName;
  var attendPct   = player.attendance || '—';
  var initials    = displayName.slice(0, 2).toUpperCase();
  var bisItems    = getBisItems(player.firstName);
  var classLine   = player.class ? '<span class="badge badge-class">' + player.class + (player.spec ? ' · ' + player.spec : '') + '</span>' : '';
  var trialBadge  = player.isTrial ? '<span class="badge badge-trial">Trial</span>' : '';

  var bisHTML;
  if (player.bisLink) {
    bisHTML = '<div class="bis-row"><div class="bis-dot yes"></div><a class="bis-link" href="' + player.bisLink + '" target="_blank" rel="noopener">View my BiS list →</a></div>';
  } else {
    bisHTML = '<div class="bis-row"><div class="bis-dot no"></div><span class="bis-none">No BiS list submitted yet</span></div>';
  }

  var rows = '';
  for (var i = 0; i < bisItems.length; i++) {
    var entry    = bisItems[i];
    var item     = entry.item;
    var bisSlot  = entry.slot;
    var rank     = getRank(player.firstName, item);
    var slot     = (DATA.itemSlots || {})[item] || bisSlot || '';
    var isGeneric = (item === 'M+' || item === 'Crafted' || item === 'Catalyst');
    var leftLabel = isGeneric
      ? '<span class="priority-item-slot" style="text-transform:uppercase;letter-spacing:0.07em;white-space:nowrap;">' + item + '</span>'
      : rankPillHTML(rank);
    rows += '<div class="priority-row" style="grid-template-columns:auto auto 1fr;">';
    rows += leftLabel;
    rows += '<span class="priority-item-slot">' + slot + '</span>';
    rows += '<span class="priority-item-name" style="text-align:right;" title="' + item + '">' + (isGeneric ? '' : item) + '</span>';
    rows += '</div>';
  }
  var priorityHTML = bisItems.length
    ? '<div class="priority-list">' + rows + '</div>'
    : '<p class="no-items-msg">No BiS items on record yet.</p>';

 var lootMap = DATA.lootCounts || {};
 var normFirst = normalise(player.firstName);
 var lootMap   = DATA.lootCounts || {};
 var lootKey   = Object.keys(lootMap).find(function(k) { return normalise(k) === normFirst; });
 var lootEntry = lootKey ? lootMap[lootKey] : null;
 var lootCount = lootEntry ? lootEntry.count : 0;
 var lootItemsHTML = lootEntry ? lootEntry.items.map(function(item) {
   return '<div style="font-size:0.82rem;color:var(--text-muted);padding:0.3rem 0;border-bottom:1px solid var(--border);">' + item + '</div>';
 }).join('') : '';
 var barWidth = player.attendance ? player.attendance : '0%';

  profile.innerHTML =
    '<div class="profile-card">' +
      '<div class="role-bar role-bar-' + player.role + '"></div>' +
      '<div class="role-bar role-bar-' + player.role + '"></div>' +
      '<div style="padding:0.6rem 1.25rem;border-bottom:1px solid var(--border);">' +
        '<button onclick="document.getElementById(\'playerSelect\').value=\'\';renderAttendanceOverview();" style="background:none;border:none;color:var(--text-dim);font-family:\'Rajdhani\',sans-serif;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;padding:0;">← Back to roster</button>' +
      '</div>' +
      '<div class="profile-header">' +
        '<div class="profile-avatar avatar-' + player.role + '">' + initials + '</div>' +
        '<div class="profile-identity">' +
          '<div class="profile-name">' + displayName + '</div>' +
          '<div class="profile-realm">' + player.firstName + '-' + player.realm + '</div>' +
          '<div class="profile-badges">' +
            '<span class="badge badge-' + player.role + '">' + player.role + '</span>' +
            trialBadge + classLine +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="profile-section">' +
        '<div class="section-label">Attendance</div>' +
        '<div class="attend-row">' +
          '<div class="attend-bar-wrap"><div class="attend-bar" style="width:' + barWidth + '"></div></div>' +
          '<span class="attend-label">' + attendPct + '</span>' +
        '</div>' +
      '</div>' +
     '<div class="profile-section" onclick="var l=document.getElementById(\'loot-list\');l.style.display=l.style.display===\'none\'?\'block\':\'none\'" style="cursor:pointer;">' +
      '<div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">Items Received <span style="font-size:0.7rem;color:var(--text-dim);">tap to expand</span></div>' +
      '<div style="font-size:1.1rem;font-weight:600;color:var(--gold);">' + lootCount + ' item' + (lootCount !== 1 ? 's' : '') + ' this tier</div>' +
      '<div id="loot-list" style="display:none;margin-top:0.75rem;flex-direction:column;gap:0.35rem;">' +
        lootItemsHTML +
      '</div>' +
    '</div>' +
      '<div class="profile-section">' +
        '<div class="section-label">BiS List</div>' +
        bisHTML +
      '</div>' +
      '<div class="profile-section">' +
        '<div class="section-label">Loot Priority</div>' +
        priorityHTML +
      '</div>' +
    '</div>';

  profile.style.display = '';
}

document.getElementById('playerSelect').addEventListener('change', function(e) {
  if (e.target.value) {
    renderProfile(e.target.value);
  } else {
    renderAttendanceOverview();
  }
});

loadData();
</script>
</body>
</html>
