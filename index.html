<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Team Phoenix — Roster</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  :root {
    --bg:          #0d0e12;
    --bg-card:     #13151c;
    --bg-elevated: #1a1d27;
    --bg-input:    #0f1118;
    --border:      rgba(255,255,255,0.07);
    --border-mid:  rgba(255,255,255,0.12);
    --gold:        #d6a344;
    --gold-dim:    #9e742a;
    --gold-light:  #f0c870;
    --text:        #e8e3d8;
    --text-muted:  #7a7568;
    --text-dim:    #8a8680;
    --tank:        #4a9eff;
    --heal:        #3ddc84;
    --ranged:      #bf8cff;
    --melee:       #ff7c5c;
  }
  body { background:var(--bg); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:16px; min-height:100vh; display:flex; flex-direction:column; }

  /* Header */
  .header { position:relative; padding:2.5rem 2rem 2rem; text-align:center; border-bottom:1px solid var(--border); overflow:hidden; }
  .header::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse 60% 140% at 50% 0%, rgba(214,163,68,0.07) 0%, transparent 70%); pointer-events:none; }
  .header-emblem { font-size:2rem; display:block; margin-bottom:0.4rem; filter:drop-shadow(0 0 10px rgba(214,163,68,0.35)); }
  .header h1 { font-family:'Cinzel',serif; font-size:1.7rem; font-weight:700; letter-spacing:0.12em; color:var(--gold-light); text-shadow:0 0 24px rgba(214,163,68,0.25); }
  .header-sub { font-size:0.75rem; color:var(--text-muted); letter-spacing:0.18em; text-transform:uppercase; margin-top:0.3rem; }
  .header-divider { width:100px; height:1px; background:linear-gradient(90deg,transparent,var(--gold-dim),transparent); margin:1rem auto 0; }

  /* States */
  .state-msg { text-align:center; padding:3rem 2rem; color:var(--text); font-size:0.85rem; letter-spacing:0.05em; }
  .state-msg.error { color:#ff7c5c; }
  .spinner { display:inline-block; width:20px; height:20px; border:2px solid var(--border-mid); border-top-color:var(--gold-dim); border-radius:50%; animation:spin 0.8s linear infinite; margin-bottom:0.75rem; }
  @keyframes spin { to { transform:rotate(360deg); } }

  /* Views */
  .view { display:none; flex:1; flex-direction:column; }
  .view.active { display:flex; }

  /* Landing */
  .landing-body { flex:1; display:flex; flex-direction:column; align-items:center; padding:3rem 2rem 2rem; gap:0.6rem; }
  .selector-label { font-size:0.7rem; letter-spacing:0.18em; text-transform:uppercase; color:var(--text-muted); font-weight:600; }
  .selector-outer { position:relative; width:100%; max-width:360px; }
  .selector-outer::after { content:'▾'; position:absolute; right:14px; top:50%; transform:translateY(-50%); color:var(--gold-dim); pointer-events:none; font-size:0.9rem; }
  select#playerSelect { width:100%; appearance:none; background:var(--bg-input); border:1px solid var(--border-mid); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:1rem; font-weight:500; padding:0.65rem 2.2rem 0.65rem 1rem; border-radius:3px; cursor:pointer; transition:border-color 0.15s; outline:none; }
  select#playerSelect:hover { border-color:var(--gold-dim); }
  select#playerSelect:focus { border-color:var(--gold); box-shadow:0 0 0 2px rgba(214,163,68,0.12); }
  select#playerSelect option { background:#1a1d27; }
  .officer-link { margin-top:2rem; font-size:0.7rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text-dim); cursor:pointer; border-bottom:1px solid transparent; transition:color 0.15s,border-color 0.15s; }
  .officer-link:hover { color:var(--text-muted); border-color:var(--text-dim); }

  /* Officer password prompt */
  .officer-prompt { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.7); z-index:100; align-items:center; justify-content:center; }
  .officer-prompt.active { display:flex; }
  .officer-prompt-box { background:var(--bg-card); border:1px solid var(--border-mid); border-radius:6px; padding:2rem; width:100%; max-width:320px; display:flex; flex-direction:column; gap:1rem; }
  .officer-prompt-box h2 { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold-light); letter-spacing:0.1em; }
  .officer-prompt-box input { width:100%; background:var(--bg-input); border:1px solid var(--border-mid); color:var(--text); font-family:'Rajdhani',sans-serif; font-size:1rem; padding:0.6rem 1rem; border-radius:3px; outline:none; }
  .officer-prompt-box input:focus { border-color:var(--gold); }
  .prompt-buttons { display:flex; gap:0.5rem; }
  .btn { font-family:'Rajdhani',sans-serif; font-size:0.82rem; font-weight:600; letter-spacing:0.1em; text-transform:uppercase; padding:0.55rem 1.25rem; border-radius:3px; cursor:pointer; border:none; }
  .btn-gold { background:rgba(214,163,68,0.12); border:1px solid var(--gold-dim); color:var(--gold-light); }
  .btn-gold:hover { background:rgba(214,163,68,0.2); }
  .btn-muted { background:transparent; border:1px solid var(--border-mid); color:var(--text); }
  .btn-muted:hover { background:var(--bg-elevated); }

  /* Profile view */
  #profileView { padding:0 2rem 3rem; max-width:680px; width:100%; margin:0 auto; }
  .profile-card { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; overflow:hidden; animation:fadeUp 0.25s ease; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .role-bar { height:3px; width:100%; }
  .role-bar-Tank   { background:var(--tank); }
  .role-bar-Heal   { background:var(--heal); }
  .role-bar-Ranged { background:var(--ranged); }
  .role-bar-Melee  { background:var(--melee); }
  .profile-header { display:flex; align-items:center; gap:1rem; padding:1.25rem 1.25rem 1rem; border-bottom:1px solid var(--border); }
  .profile-avatar { width:52px; height:52px; border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:1.15rem; font-weight:600; flex-shrink:0; }
  .avatar-Tank   { background:rgba(74,158,255,0.12);  color:var(--tank);   border:1px solid rgba(74,158,255,0.25); }
  .avatar-Heal   { background:rgba(61,220,132,0.12);  color:var(--heal);   border:1px solid rgba(61,220,132,0.25); }
  .avatar-Ranged { background:rgba(191,140,255,0.12); color:var(--ranged); border:1px solid rgba(191,140,255,0.25); }
  .avatar-Melee  { background:rgba(255,124,92,0.12);  color:var(--melee);  border:1px solid rgba(255,124,92,0.25); }
  .profile-identity { flex:1; min-width:0; }
  .profile-name { font-family:'Cinzel',serif; font-size:1.2rem; font-weight:700; color:var(--text); line-height:1.2; }
  .profile-realm { font-size:1rem; color:var(--text-dim); letter-spacing:0.04em; margin-top:2px; }
  .profile-badges { display:flex; gap:0.4rem; margin-top:0.5rem; flex-wrap:wrap; align-items:center; }
  .badge { font-size:0.72rem; font-weight:600; letter-spacing:0.09em; text-transform:uppercase; padding:2px 8px; border-radius:2px; }
  .badge-Tank   { background:rgba(74,158,255,0.12);  color:var(--tank);   border:1px solid rgba(74,158,255,0.2); }
  .badge-Heal   { background:rgba(61,220,132,0.12);  color:var(--heal);   border:1px solid rgba(61,220,132,0.2); }
  .badge-Ranged { background:rgba(191,140,255,0.12); color:var(--ranged); border:1px solid rgba(191,140,255,0.2); }
  .badge-Melee  { background:rgba(255,124,92,0.12);  color:var(--melee);  border:1px solid rgba(255,124,92,0.2); }
  .badge-trial  { background:rgba(240,200,112,0.1);  color:#f0c870;       border:1px solid rgba(240,200,112,0.2); }
  .badge-class  { background:rgba(255,255,255,0.04); color:var(--text);   border:1px solid var(--border); }
  .profile-section { padding:1rem 1.25rem; border-bottom:1px solid var(--border); }
  .profile-section:last-child { border-bottom:none; }
  .section-label { font-size:1rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-dim); font-weight:600; margin-bottom:0.75rem; }
  .bis-row { display:flex; align-items:center; gap:0.65rem; }
  .bis-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .bis-dot.yes { background:#3ddc84; box-shadow:0 0 6px rgba(61,220,132,0.35); }
  .bis-dot.no  { background:var(--text-dim); }
  .bis-link { font-size:0.85rem; font-weight:500; color:var(--gold); text-decoration:none; border-bottom:1px solid rgba(214,163,68,0.3); transition:color 0.15s,border-color 0.15s; word-break:break-all; }
  .bis-link:hover { color:var(--gold-light); border-color:var(--gold); }
  .bis-none { font-size:0.85rem; color:var(--text); }
  .priority-list { display:flex; flex-direction:column; gap:0.5rem; }
  .priority-row { display:grid; grid-template-columns:auto auto 1fr; align-items:center; gap:0.75rem; background:var(--bg-elevated); border:1px solid var(--border); border-radius:3px; padding:0.6rem 0.8rem; }
  .priority-item-name { font-size:1.2rem; font-weight:500; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .priority-item-slot { font-size:0.88rem; color:var(--text); text-transform:uppercase; letter-spacing:0.07em; white-space:nowrap; }
  .rank-pill { font-family:'Cinzel',serif; font-size:0.72rem; font-weight:600; padding:3px 10px; border-radius:2px; min-width:40px; text-align:center; white-space:nowrap; }
  .no-items-msg { font-size:0.88rem; color:var(--text); font-style:italic; }
  .attend-row { display:flex; align-items:center; gap:0.75rem; }
  .attend-bar-wrap { flex:1; height:6px; background:var(--bg-elevated); border-radius:3px; overflow:hidden; border:1px solid var(--border); }
  .attend-bar { height:100%; border-radius:3px; background:var(--heal); transition:width 0.4s ease; }
  .attend-label { font-size:0.88rem; font-weight:600; color:var(--text); min-width:42px; text-align:right; }

  /* Officer dashboard */
  #officerView { padding:1.5rem 2rem 3rem; max-width:960px; width:100%; margin:0 auto; }
  .officer-toolbar { display:flex; align-items:center; justify-content:space-between; margin-bottom:1.25rem; flex-wrap:wrap; gap:0.75rem; }
  .officer-toolbar h2 { font-family:'Cinzel',serif; font-size:1rem; color:var(--gold-light); letter-spacing:0.1em; }

  /* Tabs */
  .tab-bar { display:flex; gap:0; border-bottom:1px solid var(--border); margin-bottom:1.5rem; }
  .tab-btn { font-family:'Rajdhani',sans-serif; font-size:0.82rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:0.6rem 1.25rem; background:transparent; border:none; border-bottom:2px solid transparent; color:var(--text-muted); cursor:pointer; transition:color 0.15s,border-color 0.15s; margin-bottom:-1px; }
  .tab-btn:hover { color:var(--text); }
  .tab-btn.active { color:var(--gold-light); border-bottom-color:var(--gold); }
  .tab-panel { display:none; }
  .tab-panel.active { display:block; }

  /* Roster table */
  .roster-table { width:100%; border-collapse:collapse; }
  .roster-table th { font-size:0.82rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text); font-weight:600; padding:0.6rem 0.75rem; border-bottom:1px solid var(--border); text-align:left; cursor:pointer; user-select:none; }
  .roster-table th:not(:first-child) { text-align:center; }
  .roster-table th:hover { color:var(--gold-light); }
  .roster-table td { padding:0.6rem 0.75rem; border-bottom:1px solid var(--border); font-size:1rem; vertical-align:middle; color:var(--text); }
  .roster-table td:not(:first-child) { text-align:center; }
  .roster-table tr.group-header td { font-size:0.72rem; letter-spacing:0.15em; text-transform:uppercase; color:var(--text-muted); font-weight:600; padding:0.75rem 0.75rem 0.3rem; background:transparent; border-bottom:none; }
  .roster-table tr.player-row { cursor:pointer; transition:background 0.1s; }
  .roster-table tr.player-row:hover { background:var(--bg-elevated); }
  .roster-table tr.player-row.selected { background:rgba(214,163,68,0.06); }
  .player-name-cell { display:flex; align-items:center; gap:0.5rem; }
  .mini-avatar { width:28px; height:28px; border-radius:3px; display:flex; align-items:center; justify-content:center; font-family:'Cinzel',serif; font-size:0.65rem; font-weight:600; flex-shrink:0; }
  .attend-mini { font-size:1rem; font-weight:600; }
  .tag { font-size:0.6rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:1px 6px; border-radius:2px; }
  .tag-trial { background:rgba(240,200,112,0.1); color:#f0c870; border:1px solid rgba(240,200,112,0.2); }
  .tag-bench { background:rgba(255,255,255,0.04); color:var(--text); border:1px solid var(--border); }
  #officerProfile { margin-top:1.5rem; }

  /* Roster filters */
  .filter-bar { display:flex; gap:0.5rem; margin-bottom:1rem; flex-wrap:wrap; align-items:center; }
  .filter-chip { font-family:'Rajdhani',sans-serif; font-size:0.75rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; padding:0.3rem 0.8rem; border-radius:3px; cursor:pointer; border:1px solid var(--border); background:transparent; color:var(--text); transition:all 0.15s; }
  .filter-chip.active { background:rgba(214,163,68,0.12); border-color:var(--gold-dim); color:var(--gold-light); }
  .filter-chip:hover { border-color:var(--border-mid); }

  /* BiS conflicts */
  .conflict-item { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:1rem 1.25rem; margin-bottom:0.75rem; }
  .conflict-item-name { font-size:1.1rem; font-weight:600; color:var(--text); margin-bottom:0.5rem; display:flex; align-items:center; gap:0.75rem; }
  .conflict-count { font-size:0.72rem; font-weight:600; padding:2px 8px; border-radius:2px; background:rgba(214,163,68,0.12); color:var(--gold); border:1px solid rgba(214,163,68,0.25); }
  .conflict-players { display:flex; flex-wrap:wrap; gap:0.4rem; }
  .conflict-player-tag { font-size:0.78rem; padding:2px 8px; border-radius:2px; background:var(--bg-elevated); border:1px solid var(--border); color:var(--text); }
  .conflict-player-tag.ranked { border-color:rgba(214,163,68,0.3); color:var(--gold-light); }

  /* Loot fairness */
  .fairness-row { display:grid; grid-template-columns:150px 1fr 50px; align-items:center; gap:1rem; padding:0.5rem 0; border-bottom:1px solid var(--border); }
  .fairness-bar-wrap { height:6px; background:var(--bg-elevated); border-radius:3px; overflow:hidden; }
  .fairness-bar { height:100%; border-radius:3px; background:var(--ranged); }
  .fairness-count { font-size:0.88rem; font-weight:600; color:var(--text); text-align:right; }

  /* Attendance tab */
  .attend-player-row { background:var(--bg-card); border:1px solid var(--border); border-radius:4px; padding:1rem 1.25rem; margin-bottom:0.75rem; }
  .attend-player-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:0.5rem; }
  .attend-player-name { font-size:1rem; font-weight:600; color:var(--text); }
  .attend-penalty-list { display:flex; flex-direction:column; gap:0.25rem; margin-top:0.5rem; }
  .attend-penalty-entry { display:flex; justify-content:space-between; font-size:0.88rem; padding:0.2rem 0; border-bottom:1px solid var(--border); }

  /* Footer */
  .footer { text-align:center; padding:1.5rem; font-size:0.65rem; color:var(--text-dim); letter-spacing:0.12em; text-transform:uppercase; border-top:1px solid var(--border); margin-top:auto; }
</style>
</head>
<body>

<header class="header">
  <span class="header-emblem">🔥</span>
  <h1>Team Phoenix</h1>
  <p class="header-sub">Season 2 · Loot Priority</p>
  <div class="header-divider"></div>
</header>

<div id="loadingMsg" class="state-msg">
  <div class="spinner"></div><br>Loading roster data…
</div>

<!-- Landing -->
<div id="landingView" class="view">
  <div class="landing-body">
    <span class="selector-label">Who are you?</span>
    <div class="selector-outer">
      <select id="playerSelect">
        <option value="">— Select your character —</option>
      </select>
    </div>
    <span class="officer-link" onclick="showOfficerPrompt()">Officer Access</span>
  </div>
  <div class="footer">Team Phoenix · Season 2</div>
</div>

<!-- Profile -->
<div id="profileViewWrap" class="view">
  <div id="profileView"></div>
  <div class="footer">Team Phoenix · Season 2</div>
</div>

<!-- Officer -->
<div id="officerViewWrap" class="view">
  <div id="officerView">
    <div class="officer-toolbar">
      <h2>Officer Dashboard</h2>
      <div style="display:flex;gap:0.5rem;">
        <button class="btn btn-muted" onclick="showView('landing')">← Back</button>
        <button class="btn btn-muted" onclick="officerLogout()">Log out</button>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('roster')">Roster</button>
      <button class="tab-btn" onclick="switchTab('conflicts')">BiS Conflicts</button>
      <button class="tab-btn" onclick="switchTab('fairness')">Loot Fairness</button>
      <button class="tab-btn" onclick="switchTab('attendance')">Attendance</button>
    </div>

    <!-- Roster tab -->
    <div id="tab-roster" class="tab-panel active">
      <div class="filter-bar">
        <span style="font-size:0.78rem;color:var(--text);margin-right:0.25rem;">Filter:</span>
        <button class="filter-chip" onclick="toggleFilter('lowAttend')" id="chip-lowAttend">Low Attendance (&lt;90%)</button>
        <button class="filter-chip" onclick="toggleFilter('noBis')" id="chip-noBis">No BiS Link</button>
        <button class="filter-chip" onclick="toggleFilter('trial')" id="chip-trial">Trials Only</button>
        <button class="filter-chip" onclick="toggleFilter('bench')" id="chip-bench">Bench Only</button>
      </div>
      <table class="roster-table" id="rosterTable"></table>
      <div id="officerProfile"></div>
    </div>

    <!-- BiS Conflicts tab -->
    <div id="tab-conflicts" class="tab-panel">
      <div id="conflictsContent"></div>
    </div>

    <!-- Loot Fairness tab -->
    <div id="tab-fairness" class="tab-panel">
      <div id="fairnessContent"></div>
    </div>

    <!-- Attendance tab -->
    <div id="tab-attendance" class="tab-panel">
      <div id="attendanceContent"></div>
    </div>
  </div>
  <div class="footer">Team Phoenix · Season 2</div>
</div>

<!-- Officer password prompt -->
<div id="officerPrompt" class="officer-prompt">
  <div class="officer-prompt-box">
    <h2>Officer Access</h2>
    <input id="officerPassword" type="password" placeholder="Password"
      onkeydown="if(event.key==='Enter')submitOfficerPassword();" />
    <p id="officerError" style="display:none;font-size:0.88rem;color:var(--melee);">Incorrect password</p>
    <div class="prompt-buttons">
      <button class="btn btn-gold" onclick="submitOfficerPassword()">Enter</button>
      <button class="btn btn-muted" onclick="hideOfficerPrompt()">Cancel</button>
    </div>
  </div>
</div>

<script>
var WEB_APP_URL  = 'https://script.google.com/macros/s/AKfycbxrQdQGqbBTELWm7huWChdbES0ry7WFZetlELWuEdI0T6lfbXEzrqx9Vo5yA-b9dW4y7A/exec';
var OFFICER_PASS = 'phoenix2'; // change this
var DATA         = null;
var activeFilters = {};
var selectedOfficerPlayer = null;

function normalise(str) {
  return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().trim();
}

// ── Views ──────────────────────────────────────────────────────────────────
function showView(name) {
  document.getElementById('loadingMsg').style.display = 'none';
  ['landingView','profileViewWrap','officerViewWrap'].forEach(function(id) {
    document.getElementById(id).classList.remove('active');
  });
  if (name === 'landing') document.getElementById('landingView').classList.add('active');
  if (name === 'profile') document.getElementById('profileViewWrap').classList.add('active');
  if (name === 'officer') document.getElementById('officerViewWrap').classList.add('active');
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach(function(b) { b.classList.remove('active'); });
  document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
  event.target.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'conflicts')  buildConflicts();
  if (name === 'fairness')   buildFairness();
  if (name === 'attendance') buildAttendanceTab();
}

// ── Load data ──────────────────────────────────────────────────────────────
function loadData() {
  window._rosterCallback = function(data) {
    try {
      if (data.error) throw new Error(data.error);
      DATA = data;
      populateDropdown();
      if (sessionStorage.getItem('phoenix_officer') === '1') {
        buildOfficerDashboard();
        showView('officer');
      } else {
        showView('landing');
      }
    } catch (e) {
      document.getElementById('loadingMsg').className = 'state-msg error';
      document.getElementById('loadingMsg').innerHTML = 'Could not load roster data. ' + e.message;
    }
  };
  var script = document.createElement('script');
  script.src = WEB_APP_URL + '?callback=_rosterCallback';
  script.onerror = function() {
    document.getElementById('loadingMsg').className = 'state-msg error';
    document.getElementById('loadingMsg').innerHTML = 'Could not load roster data.';
  };
  document.head.appendChild(script);
  setTimeout(function() {
    if (!DATA) {
      document.getElementById('loadingMsg').className = 'state-msg error';
      document.getElementById('loadingMsg').innerHTML = 'Request timed out.';
    }
  }, 15000);
}

// ── Dropdown ───────────────────────────────────────────────────────────────
function populateDropdown() {
  var sel    = document.getElementById('playerSelect');
  var order  = ['Tank','Heal','Melee','Ranged'];
  var labels = { Tank:'🛡 Tanks', Heal:'💚 Healers', Melee:'⚔️ Melee', Ranged:'🏹 Ranged' };
  var groups = { Tank:[], Heal:[], Melee:[], Ranged:[] };
  for (var i = 0; i < DATA.roster.length; i++) {
    var p = DATA.roster[i];
    if (!p.isBench && groups[p.role]) groups[p.role].push(p);
  }
  for (var r = 0; r < order.length; r++) {
    var role = order[r];
    var players = groups[role];
    if (!players.length) continue;
    players.sort(function(a,b) { return (a.nick||a.firstName).localeCompare(b.nick||b.firstName); });

// ── Helpers ────────────────────────────────────────────────────────────────
function getRank(firstName, itemName) {
  var list = (DATA.priorityOrder || {})[itemName];
  if (!list) return null;
  var norm = normalise(firstName);
  for (var i = 0; i < list.length; i++) { if (normalise(list[i]) === norm) return i + 1; }
  return null;
}
function getBisItems(firstName) {
  var bisMap = DATA.bisList || {};
  var norm   = normalise(firstName);
  var key    = null;
  var keys   = Object.keys(bisMap);
  for (var i = 0; i < keys.length; i++) { if (normalise(keys[i]) === norm) { key = keys[i]; break; } }
  var entries = key ? bisMap[key] : [];
  return entries.map(function(e) { return (typeof e === 'string') ? {item:e,slot:''} : e; });
}
function getLootEntry(firstName) {
  var lootMap = DATA.lootCounts || {};
  var norm    = normalise(firstName);
  var keys    = Object.keys(lootMap);
  for (var i = 0; i < keys.length; i++) { if (normalise(keys[i]) === norm) return lootMap[keys[i]]; }
  return null;
}
function rankPillHTML(rank) {
  if (rank === null) return '<span style="font-size:0.72rem;color:var(--text-dim);min-width:40px;text-align:center;">—</span>';
  var t  = Math.min((rank-1)/14, 1);
  var rv = Math.round(214+(100-214)*t), gv = Math.round(163+(100-163)*t), bv = Math.round(68+(100-68)*t);
  var a  = Math.max(0.08, 0.18-t*0.1);
  var c  = 'rgb('+rv+','+gv+','+bv+')', bg = 'rgba('+rv+','+gv+','+bv+','+a+')', bd = 'rgba('+rv+','+gv+','+bv+','+ Math.max(0.2,0.4-t*0.2)+')';
  return '<span class="rank-pill" style="background:'+bg+';color:'+c+';border:1px solid '+bd+';">#'+rank+'</span>';
}
function getSlotColor(slot) {
  var s = (slot||'').toUpperCase();
  if (s==='TRINKET'||s==='TRINKET 1'||s==='TRINKET 2') return 'var(--gold)';
  if (s==='NECK'||s==='RING 1'||s==='RING 2')          return 'var(--ranged)';
  if (s==='1H/2H'||s==='OH')                            return 'var(--melee)';
  if (['HEAD','SHOULDERS','CHEST','GLOVES','LEGS','CLOAK','BRACERS','BELT','BOOTS'].indexOf(s)>=0) return 'var(--tank)';
  return 'var(--text)';
}
function attendColor(pct) { return pct>=90?'var(--heal)':pct>=75?'var(--gold)':'var(--melee)'; }

// ── Render profile ─────────────────────────────────────────────────────────
function renderProfile(firstName, backTo, container) {
  var norm   = normalise(firstName);
  var player = null;
  for (var i = 0; i < DATA.roster.length; i++) { if (normalise(DATA.roster[i].firstName)===norm) { player=DATA.roster[i]; break; } }

  var displayName = player.nick || player.firstName;

  var trialBadge  = player.isTrial ? '<span class="badge badge-trial">Trial</span>' : '';
  var benchBadge  = player.isBench ? '<span class="badge" style="background:rgba(255,255,255,0.04);color:var(--text);border:1px solid var(--border);">Bench</span>' : '';

  var attendPct    = player.attendance || '—';

    attendExtra += '<div id="attend-detail" style="display:none;margin-top:0.75rem;flex-direction:column;gap:0.3rem;">';
    for (var ai = 0; ai < attendDetail.length; ai++) {
      var ae = attendDetail[ai];

      attendExtra += '<span style="color:'+sc+';font-weight:600;">'+ae.status+'</span></div>';
    }
    attendExtra += '</div>';
  }

  // Loot
  var lootEntry     = getLootEntry(player.firstName);
  var lootCount     = lootEntry ? lootEntry.count : 0;
  var lootItemsHTML = '';
  if (lootEntry && lootEntry.items) {
    for (var li = 0; li < lootEntry.items.length; li++) {
      lootItemsHTML += '<div style="font-size:0.88rem;color:var(--text);padding:0.3rem 0;border-bottom:1px solid var(--border);">'+lootEntry.items[li]+'</div>';

  // BiS link
  var bisHTML = player.bisLink
    ? '<div class="bis-row"><div class="bis-dot yes"></div><a class="bis-link" href="'+player.bisLink+'" target="_blank" rel="noopener">View BiS list →</a></div>'
    : '<div class="bis-row"><div class="bis-dot no"></div><span class="bis-none">No BiS list submitted yet</span></div>';

  // Priority
  var bisItems = getBisItems(player.firstName);
  var rows = '';
  for (var bi = 0; bi < bisItems.length; bi++) {
    var entry = bisItems[bi];
    var item  = entry.item, bisSlot = entry.slot;
    var rank  = getRank(player.firstName, item);
    var slot  = (DATA.itemSlots||{})[item] || bisSlot || '';
    var isGen = (item==='M+'||item==='Crafted'||item==='Catalyst');
    rows += '<div class="priority-row" style="grid-template-columns:auto auto 1fr;">';
    rows += isGen ? '<span style="font-size:0.72rem;color:var(--text-dim);min-width:40px;text-align:center;">—</span>' : rankPillHTML(rank);
    rows += '<span class="priority-item-slot" style="color:'+getSlotColor(slot)+';">'+slot+'</span>';
    rows += '<span class="priority-item-name" style="text-align:right;" title="'+item+'">'+item+'</span></div>';
  }
  var priorityHTML = bisItems.length
    ? '<div class="priority-list">' +
        '<div class="priority-row" style="grid-template-columns:auto auto 1fr;background:transparent;border:none;padding:0.2rem 0.8rem;">' +
          '<span style="font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);">Prio</span>' +
          '<span style="font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);">Slot</span>' +
          '<span style="font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;color:var(--text);text-align:right;">Item / Source</span>' +
        '</div>' + rows + '</div>'
    : '<p class="no-items-msg">No BiS items on record yet.</p>';

  var backLabel  = backTo==='officer' ? '← Back to dashboard' : '← Back to roster';
  var backAction = backTo==='officer'
    ? 'document.getElementById(\'officerProfile\').innerHTML=\'\';selectedOfficerPlayer=null;document.querySelectorAll(\'.player-row\').forEach(function(r){r.classList.remove(\'selected\')});'
    : 'showView(\'landing\');document.getElementById(\'playerSelect\').value=\'\';';

  var html =
    '<div class="profile-card">' +
      '<div class="role-bar role-bar-'+player.role+'"></div>' +
      '<div style="padding:0.6rem 1.25rem;border-bottom:1px solid var(--border);">' +
        '<button onclick="'+backAction+'" style="background:none;border:none;color:var(--text);font-family:\'Rajdhani\',sans-serif;font-size:0.78rem;letter-spacing:0.1em;text-transform:uppercase;cursor:pointer;padding:0;">'+backLabel+'</button>' +
      '</div>' +
      '<div class="profile-header">' +
        '<div class="profile-avatar avatar-'+player.role+'">'+initials+'</div>' +
        '<div class="profile-identity">' +
          '<div class="profile-name">'+displayName+'</div>' +
          '<div class="profile-realm">'+player.firstName+'-'+player.realm+'</div>' +
          '<div class="profile-badges"><span class="badge badge-'+player.role+'">'+player.role+'</span>'+trialBadge+benchBadge+classLine+'</div>' +
        '</div>' +
      '</div>' +
      '<div class="profile-section"'+(hasPenalties?' onclick="var d=document.getElementById(\'attend-detail\');d.style.display=d.style.display===\'none\'?\'flex\':\'none\';" style="cursor:pointer;"':')+'>' +

        '<div class="section-label" style="display:flex;justify-content:space-between;align-items:center;">Items Received <span style="font-size:0.7rem;color:var(--text-dim);">tap to expand</span></div>' +

        '<div id="loot-list" style="display:none;margin-top:0.75rem;flex-direction:column;gap:0.35rem;">'+lootItemsHTML+'</div>' +
      '</div>' +
      '<div class="profile-section"><div class="section-label">BiS List</div>'+bisHTML+'</div>' +
      '<div class="profile-section" onclick="var l=document.getElementById(\'prio-list\');l.style.display=l.style.display===\'none\'?\'block\':\'none\';" style="cursor:pointer;">' +

        '<div id="prio-list" style="display:none;">'+priorityHTML+'</div>' +

  if (container) { container.innerHTML = html; }
  else { document.getElementById('profileView').innerHTML = html; }

// ── Roster table ───────────────────────────────────────────────────────────
function buildRosterTable() {
  var order  = ['Tank','Heal','Melee','Ranged','Bench'];
  var labels = { Tank:'🛡 Tanks', Heal:'💚 Healers', Melee:'⚔️ Melee', Ranged:'🏹 Ranged', Bench:'🪑 Bench' };
  var groups = { Tank:[], Heal:[], Melee:[], Ranged:[], Bench:[] };

  for (var i = 0; i < DATA.roster.length; i++) {
    var p = DATA.roster[i];
    // Apply filters
    if (activeFilters.lowAttend && (parseInt(p.attendance)||0) >= 90) continue;
    if (activeFilters.noBis && p.bisLink) continue;
    if (activeFilters.trial && !p.isTrial) continue;
    if (activeFilters.bench && !p.isBench) continue;
    if (p.isBench) groups['Bench'].push(p);
    else if (groups[p.role]) groups[p.role].push(p);
  }
  for (var r = 0; r < order.length; r++) {
    groups[order[r]].sort(function(a,b) { return (a.nick||a.firstName).localeCompare(b.nick||b.firstName); });
  }

  var html = '<thead><tr><th>Player</th><th>Attendance</th><th>Items</th><th>BiS Link</th><th>Status</th></tr></thead><tbody>';
  var totalRows = 0;

  for (var r = 0; r < order.length; r++) {
    var role    = order[r];
    var players = groups[role];
    if (!players.length) continue;
    html += '<tr class="group-header"><td colspan="5">'+labels[role]+'</td></tr>';
    for (var j = 0; j < players.length; j++) {
      var p         = players[j];
      var name      = p.nick || p.firstName;
      var pct       = parseInt(p.attendance) || 0;
      var color     = attendColor(pct);
      var lootEntry = getLootEntry(p.firstName);
      var lootCount = lootEntry ? lootEntry.count : 0;
      var hasBis    = !!p.bisLink;
      var roleColor = p.role==='Tank'?'var(--tank)':p.role==='Heal'?'var(--heal)':p.role==='Ranged'?'var(--ranged)':'var(--melee)';
      var statusTags = '';
      if (p.isTrial) statusTags += '<span class="tag tag-trial">Trial</span> ';
      if (p.isBench) statusTags += '<span class="tag tag-bench">Bench</span>';
      if (!statusTags) statusTags = '<span style="color:var(--text);">—</span>';
      html += '<tr class="player-row'+(selectedOfficerPlayer===p.firstName?' selected':'')+'" onclick="officerSelectPlayer(\''+p.firstName+'\')" data-player="'+p.firstName+'">' +
        '<td><div class="player-name-cell">' +
          '<div class="mini-avatar" style="background:rgba(0,0,0,0.2);color:'+roleColor+';border:1px solid '+roleColor+'33;">'+name.slice(0,2).toUpperCase()+'</div>' +
          '<span style="font-weight:600;color:var(--text);">'+name+'</span>' +
          (p.firstName!==name?'<span style="font-size:0.82rem;color:var(--text-muted);">('+p.firstName+')</span>':'') +
        '</div></td>' +
        '<td><span class="attend-mini" style="color:'+color+';">'+(p.attendance||'—')+'</span></td>' +
        '<td>'+lootCount+'</td>' +
        '<td>'+(hasBis?'<span style="color:var(--heal);">✓</span>':'<span style="color:var(--text);">—</span>')+'</td>' +
        '<td>'+statusTags+'</td>' +
        '</tr>';
      totalRows++;
    }
  }
  if (totalRows === 0) html += '<tr><td colspan="5" style="text-align:center;color:var(--text-muted);padding:2rem;">No players match the current filters.</td></tr>';
  html += '</tbody>';
  document.getElementById('rosterTable').innerHTML = html;
}

function officerSelectPlayer(firstName) {
  selectedOfficerPlayer = firstName;
  buildRosterTable(); // re-render to update selected state
  var container = document.getElementById('officerProfile');
  renderProfile(firstName, 'officer', container);
  container.scrollIntoView({ behavior:'smooth', block:'start' });
}

// ── BiS Conflicts ──────────────────────────────────────────────────────────
function buildConflicts() {
  var bisList  = DATA.bisList || {};
  var prioOrder = DATA.priorityOrder || {};
  var itemMap  = {}; // item → [playerFirstNames]

  var playerKeys = Object.keys(bisList);
  for (var i = 0; i < playerKeys.length; i++) {
    var firstName = playerKeys[i];
    var items     = bisList[firstName];
    for (var j = 0; j < items.length; j++) {
      var itemName = typeof items[j] === 'string' ? items[j] : items[j].item;
      if (itemName === 'M+' || itemName === 'Crafted' || itemName === 'Catalyst') continue;
      if (!itemMap[itemName]) itemMap[itemName] = [];
      itemMap[itemName].push(firstName);
    }
  }

  // Sort by number of players wanting the item (descending)
  var sorted = Object.keys(itemMap).sort(function(a,b) { return itemMap[b].length - itemMap[a].length; });

  var html = '';
  for (var i = 0; i < sorted.length; i++) {
    var item    = sorted[i];
    var players = itemMap[item];
    var slot    = (DATA.itemSlots||{})[item] || '';
    var ranked  = prioOrder[item] || [];
    html += '<div class="conflict-item">';
    html += '<div class="conflict-item-name">';
    html += '<span>'+item+'</span>';
    if (slot) html += '<span style="font-size:0.72rem;color:'+getSlotColor(slot)+';text-transform:uppercase;letter-spacing:0.08em;">'+slot+'</span>';
    html += '<span class="conflict-count">'+players.length+' player'+(players.length!==1?'s':'')+'</span>';
    html += '</div>';
    html += '<div class="conflict-players">';
    for (var j = 0; j < players.length; j++) {
      var pName  = players[j];
      var pData  = null;
      for (var k = 0; k < DATA.roster.length; k++) { if (normalise(DATA.roster[k].firstName)===normalise(pName)) { pData=DATA.roster[k]; break; } }
      var display = pData ? (pData.nick || pData.firstName) : pName;
      var rankPos = ranked.findIndex ? ranked.findIndex(function(r){return normalise(r)===normalise(pName);}) : -1;
      var isRanked = rankPos >= 0;
      html += '<span class="conflict-player-tag'+(isRanked?' ranked':'')+'">'+display+(isRanked?' #'+(rankPos+1):'')+'</span>';
    }
    html += '</div></div>';
  }
  if (!html) html = '<p style="color:var(--text);padding:1rem;">No BiS data found.</p>';
  document.getElementById('conflictsContent').innerHTML = html;
}

// ── Loot Fairness ──────────────────────────────────────────────────────────
function buildFairness() {
  var lootMap = DATA.lootCounts || {};
  var roster  = DATA.roster || [];

  var entries = [];
  for (var i = 0; i < roster.length; i++) {
    var p     = roster[i];
    var entry = getLootEntry(p.firstName);
    entries.push({ name: p.nick||p.firstName, firstName: p.firstName, count: entry?entry.count:0, role: p.role, isBench: p.isBench });
  }
  entries.sort(function(a,b) { return b.count - a.count; });

  var max = entries.length ? entries[0].count : 1;
  if (max === 0) max = 1;

  var html = '<div style="margin-bottom:1rem;">' +
    '<div class="fairness-row" style="border-bottom:1px solid var(--border-mid);padding-bottom:0.5rem;margin-bottom:0.5rem;">' +
      '<span style="font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);">Player</span>' +
      '<span style="font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);">Items received</span>' +
      '<span style="font-size:0.78rem;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;color:var(--text);text-align:right;">#</span>' +
    '</div>';

  for (var i = 0; i < entries.length; i++) {
    var e     = entries[i];
    var width = Math.round((e.count/max)*100) + '%';
    var color = e.isBench ? 'var(--text-dim)' : e.role==='Tank'?'var(--tank)':e.role==='Heal'?'var(--heal)':e.role==='Ranged'?'var(--ranged)':'var(--melee)';
    html += '<div class="fairness-row">';
    html += '<span style="font-size:0.95rem;color:var(--text);font-weight:500;">'+e.name+'</span>';
    html += '<div class="fairness-bar-wrap"><div class="fairness-bar" style="width:'+width+';background:'+color+';"></div></div>';
    html += '<span class="fairness-count">'+e.count+'</span>';
    html += '</div>';
  }
  html += '</div>';
  document.getElementById('fairnessContent').innerHTML = html;
}

// ── Attendance tab ─────────────────────────────────────────────────────────
function buildAttendanceTab() {
  var details = DATA.attendanceDetails || {};
  var roster  = DATA.roster || [];
  var THRESHOLD = 90;

  // Find players below threshold
  var below = [];
  for (var i = 0; i < roster.length; i++) {
    var p   = roster[i];
    var pct = parseInt(p.attendance) || 0;
    if (pct < THRESHOLD) below.push(p);
  }
  below.sort(function(a,b) { return (parseInt(a.attendance)||0) - (parseInt(b.attendance)||0); });

  var html = '';
  if (!below.length) {
    html = '<p style="color:var(--text);padding:1rem;">All raiders are at or above '+THRESHOLD+'% attendance.</p>';
  } else {
    html += '<p style="font-size:0.88rem;color:var(--text);margin-bottom:1rem;">'+below.length+' raider'+(below.length!==1?'s':'')+' below '+THRESHOLD+'% attendance</p>';
    for (var i = 0; i < below.length; i++) {
      var p       = below[i];
      var name    = p.nick || p.firstName;
      var pct     = parseInt(p.attendance) || 0;
      var color   = attendColor(pct);
      var penalty = details[p.firstName] || [];

      html += '<div class="attend-player-row">';
      html += '<div class="attend-player-header">';
      html += '<span class="attend-player-name">'+name+(p.firstName!==name?' <span style="font-size:0.82rem;color:var(--text-muted);">('+p.firstName+')</span>':'')+'</span>';
      html += '<span style="font-size:1rem;font-weight:700;color:'+color+';">'+( p.attendance||'—')+'</span>';
      html += '</div>';

      // Attendance bar
      html += '<div class="attend-row" style="margin-bottom:0.5rem;">';
      html += '<div class="attend-bar-wrap"><div class="attend-bar" style="width:'+(p.attendance||'0%')+';background:'+color+';"></div></div>';
      html += '</div>';

      // Penalty entries
      if (penalty.length) {
        html += '<div class="attend-penalty-list">';
        for (var j = 0; j < penalty.length; j++) {
          var ae = penalty[j];
          var sc = ae.status==='No Show'?'var(--melee)':'var(--gold)';
          html += '<div class="attend-penalty-entry">';
          html += '<span style="color:var(--text);">'+ae.date+'</span>';
          html += '<span style="color:'+sc+';font-weight:600;">'+ae.status+'</span>';
          html += '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
  }
  document.getElementById('attendanceContent').innerHTML = html;
}

loadData();
</script>
</body>
</html>
