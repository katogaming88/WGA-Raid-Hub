# tbls config: generates dbdoc/ from the local Supabase Postgres stack.
# Docs: https://github.com/k1LoW/tbls
# Regenerate with: npm run db:docs (requires `supabase start` running).
# The DSN is the Supabase CLI local-stack default, identical on every dev
# machine and in CI. It is not a secret.
dsn: postgres://postgres:postgres@127.0.0.1:54322/postgres?sslmode=disable
docPath: dbdoc
er:
  format: mermaid
include:
  - public.*
# Without this, a table's trigger/index/constraint listing order comes
# straight off Postgres's catalog tables, which isn't guaranteed stable
# across separate `supabase db reset` runs even with identical migrations
# applied in the same order (#504) -- caused spurious `tbls diff` mismatches
# (e.g. priority_order's two triggers swapping order) that a fresh reset
# only reduced the odds of, never eliminated. Sorting makes both `db:docs`
# and `db:docs:check` deterministic regardless of catalog ordering.
sort: true
