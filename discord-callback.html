<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Logging in...</title>
<style>
  body {
    margin: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background: #1a1a2e;
    font-family: sans-serif;
    color: #ccc;
    flex-direction: column;
    gap: 16px;
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid rgba(255,255,255,0.15);
    border-top-color: #5865f2;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .msg { font-size: 0.95rem; opacity: 0.8; }
  .err { color: #f04747; font-size: 0.9rem; max-width: 320px; text-align: center; }
</style>
</head>
<body>
<div class="spinner" id="spinner"></div>
<div class="msg" id="msg">Logging you in with Discord...</div>
<div class="err" id="errMsg" style="display:none"></div>

<script>
(function() {
  var TARGET_ORIGIN = 'https://katogaming88.github.io';

  // Small mirror of common.js TEAMS map -- only the GAS URLs are needed here.
  var TEAMS = {
    phoenix:  'https://script.google.com/macros/s/AKfycbxrQdQGqbBTELWm7huWChdbES0ry7WFZetlELWuEdI0T6lfbXEzrqx9Vo5yA-b9dW4y7A/exec',
    hellfire: 'https://script.google.com/macros/s/AKfycbwIpnJyZDwWr5MmWIv7iyaDZ0OajPTFePMTYfIy8WG7jhg7pakQTvTVSM3SLihrKxBb/exec'
  };

  function getParam(name) {
    var m = location.search.match(new RegExp('[?&]' + name + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : null;
  }

  function sendToOpener(data) {
    if (window.opener) {
      window.opener.postMessage(data, TARGET_ORIGIN);
    }
    setTimeout(function() { window.close(); }, 200);
  }

  function showError(msg) {
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('msg').style.display = 'none';
    var el = document.getElementById('errMsg');
    el.textContent = msg;
    el.style.display = '';
    // Still send the error to the opener so it can react
    sendToOpener({ type: 'discord_auth_error', error: msg });
  }

  var errorParam = getParam('error');
  if (errorParam) {
    showError('Discord returned an error: ' + (getParam('error_description') || errorParam));
    return;
  }

  var code = getParam('code');
  if (!code) {
    showError('No authorization code received from Discord.');
    return;
  }

  // Determine which GAS backend to call based on the team stored by the opener.
  var teamSlug  = null;
  try { teamSlug = localStorage.getItem('wga_team'); } catch (_) {}
  teamSlug = (teamSlug && TEAMS[teamSlug]) ? teamSlug : 'phoenix';
  var gasUrl = TEAMS[teamSlug];

  // 10-second timeout guard
  var timedOut = false;
  var timeout  = setTimeout(function() {
    timedOut = true;
    showError('Login timed out. Please close this window and try again.');
  }, 10000);

  // JSONP request to GAS
  var cbName = '_discordAuthCb_' + Date.now();
  var script  = document.createElement('script');
  script.onerror = function() {
    if (timedOut) return;
    clearTimeout(timeout);
    showError('Could not reach the login server. Please try again.');
  };

  window[cbName] = function(data) {
    if (timedOut) return;
    clearTimeout(timeout);
    delete window[cbName];
    if (script.parentNode) script.parentNode.removeChild(script);

    if (!data || data.error || !data.success) {
      showError('Login failed: ' + (data && data.error ? data.error : 'Unknown error'));
      return;
    }
    sendToOpener({ type: 'discord_auth', result: data });
  };

  script.src = gasUrl + '?action=discordCallback&code=' + encodeURIComponent(code) + '&callback=' + cbName;
  document.head.appendChild(script);
})();
</script>
</body>
</html>
