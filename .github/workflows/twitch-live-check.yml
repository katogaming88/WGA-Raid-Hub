name: Twitch Live Check

# #286: keeps streamers.is_live current by calling the twitch-live-check
# Edge Function. Originally scheduled here because no pg_cron/pg_net
# infrastructure existed inside Supabase for this project -- switched to
# pg_cron (supabase/migrations/20260713234553_pg_cron_edge_function_
# scheduling.sql) after GitHub Actions' scheduled trigger proved unreliable
# in practice (#493): real gaps between runs were 1-3 hours, not the 5
# minutes this was scheduled for, which is bad enough to actively show a
# live raider as offline on the landing page for up to an hour.
#
# schedule: intentionally removed -- pg_cron now owns the 5-minute cadence.
# workflow_dispatch stays as a manual fallback/debug trigger.
#
# Requires one repo secret: TWITCH_LIVE_CHECK_SECRET, matching the same
# value set as the Edge Function's TWITCH_LIVE_CHECK_SECRET env var (Project
# Settings > Edge Functions > Secrets) -- an arbitrary shared secret, not a
# Twitch credential itself. Without it matching, the function returns 401.
on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Call twitch-live-check
        env:
          CRON_SECRET: ${{ secrets.TWITCH_LIVE_CHECK_SECRET }}
        run: |
          if [ -z "$CRON_SECRET" ]; then
            echo "TWITCH_LIVE_CHECK_SECRET repo secret is not set -- skipping."
            exit 1
          fi
          http_code=$(curl -sS -o /tmp/response.json -w "%{http_code}" \
            -X POST "https://kxgjqnpwfklbgrxdgmmv.supabase.co/functions/v1/twitch-live-check" \
            -H "x-cron-secret: $CRON_SECRET" \
            -H "Content-Type: application/json")
          echo "HTTP $http_code"
          cat /tmp/response.json
          echo
          if [ "$http_code" -ge 300 ]; then
            exit 1
          fi
