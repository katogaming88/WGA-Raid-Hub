name: Changelog Check

on:
  pull_request:
    # labeled/unlabeled so toggling the chore label re-evaluates the
    # exemption without needing a new push.
    types: [opened, synchronize, reopened, labeled, unlabeled]

# A new push to the PR supersedes any still-running check on the old commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Classifies the diff (#353): frontend = js/, gs/, and root-page paths,
      # with js/common.js counting only when its diff goes beyond the VERSION
      # line, so complying with "bump VERSION" cannot itself mark a PR
      # functional. backend = supabase/migrations/ and scripts/import/.
      # frontend_entry / backend_entry = CHANGELOG.md gained content under
      # the matching ### heading. The script has no dependencies, so no
      # npm ci here.
      - name: Classify the diff
        id: changed
        run: node scripts/ci/changelog-check.js origin/${{ github.base_ref }}

      # All four checks below share the chore exemption (chore/* branch or
      # the chore label): the VERSION bump and the sectioned changelog both
      # signal "behavior changed", which a mechanical PR does not do. #353
      # extends the exemption to the changelog-entry checks, superseding the
      # no-bypass rule from be59777.
      - name: Fail if frontend changes lack a Frontend changelog entry
        if: >-
          steps.changed.outputs.frontend == 'true' &&
          steps.changed.outputs.frontend_entry == 'false' &&
          !startsWith(github.head_ref, 'chore/') &&
          !contains(github.event.pull_request.labels.*.name, 'chore')
        run: |
          echo "::error::CHANGELOG.md gained no entry under '### Frontend'. Changes to js/, gs/, or the root pages get a Frontend entry plus a VERSION bump (see CONTRIBUTING.md); if this PR is mechanical, use a chore/* branch or the chore label."
          exit 1

      - name: Fail if frontend changes lack a VERSION bump
        if: >-
          steps.changed.outputs.frontend == 'true' &&
          steps.changed.outputs.version_bump == 'false' &&
          !startsWith(github.head_ref, 'chore/') &&
          !contains(github.event.pull_request.labels.*.name, 'chore')
        run: |
          echo "::error::The VERSION in js/common.js was not bumped. Frontend PRs bump it per CONTRIBUTING.md; if this change is mechanical (formatting, lint, comments), use a chore/* branch or add the chore label."
          exit 1

      # The reverse direction (#353): a bump with no frontend change trains
      # reflexive bumping and erodes VERSION as the "user-visible behavior
      # changed" signal.
      - name: Fail if VERSION bumps without a frontend change
        if: >-
          steps.changed.outputs.frontend == 'false' &&
          steps.changed.outputs.version_bump == 'true' &&
          !startsWith(github.head_ref, 'chore/') &&
          !contains(github.event.pull_request.labels.*.name, 'chore')
        run: |
          echo "::error::The VERSION in js/common.js was bumped, but no frontend file changed. Backend/DB-only PRs take no bump and log under '### Backend' in CHANGELOG.md instead (see CONTRIBUTING.md)."
          exit 1

      - name: Fail if backend changes lack a Backend changelog entry
        if: >-
          steps.changed.outputs.backend == 'true' &&
          steps.changed.outputs.backend_entry == 'false' &&
          !startsWith(github.head_ref, 'chore/') &&
          !contains(github.event.pull_request.labels.*.name, 'chore')
        run: |
          echo "::error::CHANGELOG.md gained no entry under '### Backend'. Changes under supabase/migrations/ or scripts/import/ get a Backend entry with no VERSION bump (see CONTRIBUTING.md); if this PR is mechanical, use a chore/* branch or the chore label."
          exit 1
