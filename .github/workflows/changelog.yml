name: Changelog Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  changelog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for skip-changelog label
        id: skip
        run: |
          if echo '${{ toJson(github.event.pull_request.labels.*.name) }}' | grep -q 'skip-changelog'; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Get changed files
        if: steps.skip.outputs.skip == 'false'
        id: changed
        run: |
          git diff --name-only origin/${{ github.base_ref }}...HEAD > changed_files.txt

          if grep -qE '^(js|gs)/.+\.(js|html)$|^[^/]+\.html$' changed_files.txt; then
            echo "functional=true" >> $GITHUB_OUTPUT
          else
            echo "functional=false" >> $GITHUB_OUTPUT
          fi

          if grep -q '^CHANGELOG.md' changed_files.txt; then
            echo "changelog=true" >> $GITHUB_OUTPUT
          else
            echo "changelog=false" >> $GITHUB_OUTPUT
          fi

      - name: Fail if functional changes without changelog update
        if: steps.skip.outputs.skip == 'false' && steps.changed.outputs.functional == 'true' && steps.changed.outputs.changelog == 'false'
        run: |
          echo "::error::CHANGELOG.md was not updated. If this PR changes how the app works or fixes a bug, please update CHANGELOG.md and bump the VERSION in js/common.js. For non-functional changes (formatting, config, docs), add the 'skip-changelog' label."
          exit 1
