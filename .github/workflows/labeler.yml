name: Auto Label

# pull_request_target (not pull_request) so this also runs -- with write access --
# on PRs opened from forks. Safe here because actions/labeler only reads the PR's
# changed-file list and .github/labeler.yml; it never checks out or executes the
# fork's code.
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

# A new push to the PR supersedes any still-running check on the old commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v6
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
