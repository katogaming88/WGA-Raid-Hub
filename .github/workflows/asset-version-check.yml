name: Asset version check

# Pure node, no database -- the same cheap job shape as the changelog-check
# tests. Runs whenever a page's asset tags or the VERSION constant change, so a
# bump that forgets to re-stamp the ?v= query strings (or a new asset tag added
# without one) fails the PR instead of shipping a stale-cache mismatch (#431).
on:
  pull_request:
    paths:
      - 'index.html'
      - 'officer.html'
      - 'admin.html'
      - 'js/common.js'
      - 'tests/ci/asset-version-check.test.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/asset-version-check.yml'

# A new push to the PR supersedes any still-running check on the old commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  asset-version-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Run asset version check
        run: npx vitest run tests/ci/asset-version-check.test.js
