name: Nightly Supabase Backup

# Backups & Recovery milestone (#541-547): the Supabase free tier has no
# PITR/automated backups, and a repo audit found no dump scripts, no export
# jobs, no recovery docs -- in-app-only data (season_signups, bis_requests,
# self_received_requests, mplus_exclusion_requests, players.officer_notes,
# team_settings incl. officer bios, site_settings, post-cutover audit_log,
# notifications, streamers, team_members Discord claims/auth links) would be
# gone for good after a bad delete or a lost project, made worse by the
# Danger Zone's one-click clear RPCs. #541 (R2 bucket) and #542 (repo
# secrets) are the prerequisites; this workflow is the actual nightly dump.
# The restore runbook + drill are #544 -- not this file.
#
# Requires four repo secrets (#542): SUPABASE_DB_URL, R2_ACCOUNT_ID,
# R2_ACCESS_KEY_ID, R2_SECRET_ACCESS_KEY. SUPABASE_DB_URL must be the
# *session pooler* connection string (port 5432), not the direct connection
# (IPv6-only -- GitHub runners are IPv4-only) and not the transaction pooler
# (port 6543 -- does not support pg_dump).
#
# Two artifacts per run, uploaded to the wga-raid-hub-backups R2 bucket
# (bucket name is plain env, not a secret -- it isn't sensitive):
#   - pg/wga-<date>.dump: pg_dump -Fc of the public schema (schema + data),
#     standalone restorable -- the one that matters for actual recovery.
#   - pg/wga-auth-<date>.dump: pg_dump -Fc --data-only of the auth schema
#     (auth.users + identities only) -- kept as a relink reference for
#     team_members.auth_user_id. Auth's own DDL is Supabase-managed, not
#     ours to back up structurally.
#
# Restore verification runs every night, not just once: a bare postgres:17
# service container (not `supabase start`'s full stack -- that proves
# migrations apply, which schema-docs.yml already checks; this proves last
# night's actual dump *artifact* restores, which means restoring from the
# binary dump file itself). The handful of roles the public schema's GRANT
# statements reference are created first (anon/authenticated/service_role,
# plus supabase/roles.sql's claude_readers), then pg_restore --no-owner, then
# asserted against (players has rows, table count clears a floor) rather
# than just trusting pg_restore's exit code -- a truncated/corrupt dump can
# still exit 0. The auth dump only gets pg_restore --list (no live
# auth.users table exists in the bare container to restore data into) --
# that alone proves the archive isn't corrupt/truncated. Any failure here
# fails the whole run.
#
# postgresql-client-17 is installed explicitly from the PGDG apt repo since
# ubuntu-latest's preinstalled client is older than the server's major
# version (17, per supabase/config.toml) -- pg_dump/pg_restore must be at or
# above the server major.
#
# Missing-secret guard follows the wcl-progression-sync.yml/twitch-live-
# check.yml style: fail loudly (exit 1), never skip silently, so a
# not-yet-configured secret stays visible as a red X in the Actions tab.
#
# Cadence: daily ~10:00 UTC (after US raid nights end) plus workflow_dispatch
# as a manual trigger. GitHub Actions cron on this repo has historically
# fired 1-3 hours late (#493) -- harmless for a once-a-day job, and pg_cron
# cannot produce an external dump/upload, so this stays on Actions unlike
# wcl-progression-sync.yml/twitch-live-check.yml (both moved to pg_cron).
on:
  schedule:
    - cron: '0 10 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  backup:
    runs-on: ubuntu-latest
    services:
      restore-check:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7

      - name: Check required secrets are set
        id: check_secrets
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          missing=""
          [ -z "$DB_URL" ] && missing="$missing SUPABASE_DB_URL"
          [ -z "$R2_ACCOUNT_ID" ] && missing="$missing R2_ACCOUNT_ID"
          [ -z "$R2_ACCESS_KEY_ID" ] && missing="$missing R2_ACCESS_KEY_ID"
          [ -z "$R2_SECRET_ACCESS_KEY" ] && missing="$missing R2_SECRET_ACCESS_KEY"
          if [ -n "$missing" ]; then
            echo "Missing required repo secret(s):$missing"
            exit 1
          fi

      - name: Install postgresql-client-17
        id: install_client
        run: |
          sudo install -d /usr/share/postgresql-common/pgdg
          sudo curl -o /usr/share/postgresql-common/pgdg/apt.postgresql.org.asc --fail https://www.postgresql.org/media/keys/ACCC4CF8.asc
          sudo sh -c 'echo "deb [signed-by=/usr/share/postgresql-common/pgdg/apt.postgresql.org.asc] https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump public schema (schema + data)
        id: dump_public
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: /usr/lib/postgresql/17/bin/pg_dump -Fc -n public --dbname "$DB_URL" -f public.dump

      - name: Dump auth data (users + identities, data only)
        id: dump_auth
        env:
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: /usr/lib/postgresql/17/bin/pg_dump -Fc --data-only -t auth.users -t auth.identities --dbname "$DB_URL" -f auth.dump

      - name: Verify both dumps restore
        id: verify_restore
        env:
          PGPASSWORD: postgres
        run: |
          RESTORE_URL="postgresql://postgres@localhost:5433/postgres"
          psql "$RESTORE_URL" -c "create role anon nologin;"
          psql "$RESTORE_URL" -c "create role authenticated nologin;"
          psql "$RESTORE_URL" -c "create role service_role nologin;"
          psql "$RESTORE_URL" -f supabase/roles.sql

          # pg_restore exits 1 whenever it ignores *any* statement error, even
          # ones that are expected/harmless here: postgres:17's image already
          # has a "public" schema, this bare container deliberately has no
          # "auth" schema (a handful of FK constraints/one RLS policy in the
          # public dump reference auth.users -- fine to skip, they don't
          # affect the assertions below), and supabase_admin isn't created
          # here (only its ALTER DEFAULT PRIVILEGES statements reference it,
          # which don't matter for this check). pg_restore itself already
          # continues past these and finishes the restore; `|| true` stops
          # bash's `set -e` from treating that nonzero exit as fatal before
          # the real signal -- the row/table-count assertions below -- ever
          # runs. A genuinely broken/truncated dump still fails those.
          /usr/lib/postgresql/17/bin/pg_restore --no-owner -d "$RESTORE_URL" public.dump || true

          player_count=$(psql "$RESTORE_URL" -tAc "select count(*) from public.players")
          table_count=$(psql "$RESTORE_URL" -tAc "select count(*) from information_schema.tables where table_schema = 'public' and table_type = 'BASE TABLE'")
          echo "Restored players: $player_count, restored public base tables: $table_count"

          if [ "$player_count" -lt 1 ]; then
            echo "Restored players table has no rows -- dump is likely broken."
            exit 1
          fi
          # Floor of 20: real count at the time this workflow was written was
          # 26 -- leaves headroom for normal schema growth while still
          # catching a badly truncated/incomplete dump.
          if [ "$table_count" -lt 20 ]; then
            echo "Restored public schema has too few tables ($table_count) -- dump is likely incomplete."
            exit 1
          fi

          /usr/lib/postgresql/17/bin/pg_restore --list auth.dump > /dev/null

      - name: Upload dumps to R2
        id: upload_r2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          aws s3 cp public.dump "s3://wga-raid-hub-backups/pg/wga-${DATE}.dump" --endpoint-url "$ENDPOINT"
          aws s3 cp auth.dump "s3://wga-raid-hub-backups/pg/wga-auth-${DATE}.dump" --endpoint-url "$ENDPOINT"

      # #547: R2 has no native "bucket is N% full" alert -- its event
      # notifications fire on individual object changes, not aggregate size --
      # so the check lives here, where the credentials and a nightly cadence
      # already exist, and reports to Discord like everything else. Runs after
      # the upload so the newest dump is counted, and only on success: if the
      # backup itself failed, the failure ping below is the message that
      # matters.
      #
      # Thresholds are plain env, not secrets: 10 GB is R2's free allotment,
      # 80% is the point where it's worth acting rather than watching. R2
      # bills overage instead of hard-stopping, so crossing the line is a
      # heads-up, not an outage -- it warns and the run still passes. A
      # genuinely broken check (listing fails, total won't parse) exits 1 on
      # purpose: a capacity check that silently stops checking is worse than
      # none, since it reads as "still fine" forever.
      #
      # Caveat: the free allotment is account-wide while this measures one
      # bucket. That holds while backups are the only thing in the account.
      # Once #546's lifecycle rule lands, usage plateaus at roughly
      # retention-days x nightly size, and this becomes the backstop for the
      # day the dumps outgrow that assumption.
      - name: Check bucket capacity
        id: capacity_check
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          USAGE_LIMIT_BYTES: 10000000000
          ALERT_PCT: 0
        run: |
          ENDPOINT="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"

          SUMMARY=$(aws s3 ls "s3://wga-raid-hub-backups" --recursive --summarize --endpoint-url "$ENDPOINT")
          USED=$(printf '%s\n' "$SUMMARY" | awk '/Total Size:/ { print $3 }')

          case "$USED" in
            '' | *[!0-9]*)
              echo "Could not read a numeric total size from the bucket listing -- failing rather than reporting a usage number that isn't real."
              printf '%s\n' "$SUMMARY" | tail -5
              exit 1
              ;;
          esac

          # Decimal GB throughout, since that's the unit Cloudflare states the
          # allotment in -- dividing by 2^30 would render the 10 GB limit as
          # "9.31 GiB" and read like a mistake.
          PCT=$(( USED * 100 / USAGE_LIMIT_BYTES ))
          USED_GB=$(awk -v b="$USED" 'BEGIN { printf "%.2f", b / 1000000000 }')
          LIMIT_GB=$(awk -v b="$USAGE_LIMIT_BYTES" 'BEGIN { printf "%.0f", b / 1000000000 }')
          echo "Bucket usage: ${USED} bytes (${USED_GB} GB), ${PCT}% of the ${LIMIT_GB} GB allotment. Alerts at ${ALERT_PCT}%."

          if [ "$PCT" -lt "$ALERT_PCT" ]; then
            exit 0
          fi

          echo "::warning::Backup bucket is at ${PCT}% of its ${LIMIT_GB} GB allotment (${USED_GB} GB used). Time to set or tighten the retention rule (#546)."

          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set -- the warning above stands, nothing posted."
            exit 0
          fi

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "Backup bucket nearing its storage allotment",
              "color": 15844367,
              "fields": [
                { "name": "Used", "value": "${USED_GB} GB (${PCT}%)", "inline": true },
                { "name": "Allotment", "value": "${LIMIT_GB} GB", "inline": true },
                { "name": "Workflow", "value": "${WORKFLOW}", "inline": true }
              ],
              "url": "${RUN_URL}"
            }]
          }
          EOF
          )

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
          echo

      # #545: scheduled-workflow failure emails only reach whoever last
      # touched this file -- Discord is where the team already watches
      # deploy status (discord-deploy.yml), so backup failures reuse the
      # same DISCORD_WEBHOOK_URL secret and curl-posted-embed shape rather
      # than a second notification channel. `if: failure()` runs regardless
      # of which step above failed (including the missing-secret guard --
      # intentionally noisy: an unprotected database should nag nightly
      # until secrets are configured). Each earlier step has an `id` so this
      # can report which one actually failed, since GitHub doesn't expose
      # that directly.
      - name: Notify Discord on failure
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          WORKFLOW: ${{ github.workflow }}
          S_SECRETS: ${{ steps.check_secrets.outcome }}
          S_INSTALL: ${{ steps.install_client.outcome }}
          S_DUMP_PUBLIC: ${{ steps.dump_public.outcome }}
          S_DUMP_AUTH: ${{ steps.dump_auth.outcome }}
          S_VERIFY: ${{ steps.verify_restore.outcome }}
          S_UPLOAD: ${{ steps.upload_r2.outcome }}
          S_CAPACITY: ${{ steps.capacity_check.outcome }}
        run: |
          if [ -z "$DISCORD_WEBHOOK_URL" ]; then
            echo "DISCORD_WEBHOOK_URL is not set -- cannot post, but the run above already failed loudly on its own."
            exit 0
          fi

          FAILED_STEP="unknown step"
          [ "$S_SECRETS" = "failure" ] && FAILED_STEP="Check required secrets are set"
          [ "$S_INSTALL" = "failure" ] && FAILED_STEP="Install postgresql-client-17"
          [ "$S_DUMP_PUBLIC" = "failure" ] && FAILED_STEP="Dump public schema (schema + data)"
          [ "$S_DUMP_AUTH" = "failure" ] && FAILED_STEP="Dump auth data (users + identities, data only)"
          [ "$S_VERIFY" = "failure" ] && FAILED_STEP="Verify both dumps restore"
          [ "$S_UPLOAD" = "failure" ] && FAILED_STEP="Upload dumps to R2"
          [ "$S_CAPACITY" = "failure" ] && FAILED_STEP="Check bucket capacity"

          PAYLOAD=$(cat <<EOF
          {
            "embeds": [{
              "title": "Nightly backup failed",
              "color": 15158332,
              "fields": [
                { "name": "Workflow", "value": "${WORKFLOW}", "inline": true },
                { "name": "Failed step", "value": "${FAILED_STEP}", "inline": true }
              ],
              "url": "${RUN_URL}"
            }]
          }
          EOF
          )

          curl -s -o /dev/null -w "%{http_code}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK_URL"
