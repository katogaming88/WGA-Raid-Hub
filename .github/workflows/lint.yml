name: Lint

on:
  pull_request:
    paths:
      - 'js/**'
      - 'scripts/**'
      - '.eslintrc.json'
      - '.prettierrc.json'
      - 'package.json'
      - 'package-lock.json'

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
