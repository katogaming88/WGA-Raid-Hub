name: Lint

on:
  pull_request:
    paths:
      - 'js/**'
      - 'scripts/**'
      - 'tests/**'
      - '.eslintrc.json'
      - '.prettierrc.json'
      - 'package.json'
      - 'package-lock.json'

# A new push to the PR supersedes any still-running check on the old commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: ESLint
        run: npm run lint
      - name: Prettier
        run: npm run format:check
